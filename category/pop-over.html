    <style>
        body {

        #btn-encuesta {

        }

        /* ===== FIX UNIVERSAL PARA QUALTRICS ===== */
        
        /* Mobile */
        @media screen and (max-width: 600px) {
            /* Cualquier div que tenga position fixed/absolute y contenga iframe */
            body > div[style*="position"][style*="fixed"],
            body > div[style*="position"][style*="absolute"] {
                position: fixed !important;
                width: 100vw !important;
                height: 100vh !important;
                max-width: 100vw !important;
                max-height: 100vh !important;
                top: 0 !important;
                left: 0 !important;
                right: 0 !important;
                bottom: 0 !important;
                margin: 0 !important;
                padding: 0 !important;
                transform: none !important;
                border-radius: 0 !important;
            }

            body > div[style*="position"] iframe {
                width: 100vw !important;
                height: 100vh !important;
                min-width: 100vw !important;
                min-height: 100vh !important;
                border: none !important;
                margin: 0 !important;
                padding: 0 !important;
            }
        }
    </style>
</head>
<body>

    <!-- ===== FIX AUTOMÁTICO ===== -->
    
    <script>
    (function() {
        function fixAllPopups() {
            var isMobile = window.innerWidth <= 600;
            
            // Buscar TODOS los divs que contengan un iframe
            var allDivs = document.querySelectorAll('body > div');
            
            allDivs.forEach(function(div) {
                var iframe = div.querySelector('iframe');
                var style = div.getAttribute('style') || '';
                
                // Si tiene iframe y parece ser un popup (tiene position en style)
                if (iframe && (style.indexOf('position') !== -1 || style.indexOf('z-index') !== -1)) {
                    
                    console.log('🎯 Popup detectado:', div);
                    
                    if (isMobile) {
                        // Aplicar estilos mobile al container
                        div.style.position = 'fixed';
                        div.style.width = '100vw';
                        div.style.height = '100vh';
                        div.style.maxWidth = '100vw';
                        div.style.maxHeight = '100vh';
                        div.style.top = '0';
                        div.style.left = '0';
                        div.style.right = '0';
                        div.style.bottom = '0';
                        div.style.margin = '0';
                        div.style.padding = '0';
                        div.style.transform = 'none';
                        div.style.borderRadius = '0';
                        
                        // Aplicar estilos mobile al iframe
                        iframe.style.width = '100vw';
                        iframe.style.height = '100vh';
                        iframe.style.minWidth = '100vw';
                        iframe.style.minHeight = '100vh';
                        iframe.style.maxWidth = '100vw';
                        iframe.style.maxHeight = '100vh';
                        iframe.style.border = 'none';
                        iframe.style.margin = '0';
                        iframe.style.padding = '0';
                        
                        iframe.removeAttribute('width');
                        iframe.removeAttribute('height');
                        
                        console.log('✅ Estilos MOBILE aplicados');
                    }
                }
            });
        }

        // Observer para detectar nuevos elementos
        var observer = new MutationObserver(function() {
            fixAllPopups();
        });

        // Iniciar observer
        if (document.body) {
            observer.observe(document.body, { childList: true, subtree: true });
        } else {
            document.addEventListener('DOMContentLoaded', function() {
                observer.observe(document.body, { childList: true, subtree: true });
            });
        }

        // También en resize
        window.addEventListener('resize', fixAllPopups);

        // Intentar cada 500ms por 15 segundos
        var attempts = 0;
        var interval = setInterval(function() {
            fixAllPopups();
            attempts++;
            if (attempts > 30) clearInterval(interval);
        }, 500);

    })();
    </script>
